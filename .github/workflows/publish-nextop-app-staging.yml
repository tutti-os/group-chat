name: Publish Nextop App Staging

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: Optional release version override. Defaults to the automatic manifest patch bump.
        required: false
        type: string
      publish_catalog:
        description: Whether to publish the staging App Center catalog after this release.
        required: false
        type: boolean
        default: false
      catalog_only:
        description: Whether to skip app release upload and only publish the existing latest release to staging catalog.
        required: false
        type: boolean
        default: false

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    uses: tutti-os/tutti/.github/workflows/publish-nextop-app-release.yml@main
    with:
      app_id: group-chat
      package_command: pnpm package:nextop
      package_dir: build/nextop-app/package
      icon_path: build/nextop-app/package/icon.svg
      release_version: ${{ inputs.release_version || '' }}
      runner: macos-latest
      pnpm_version: 10.11.0
      aws_region: ${{ vars.NEXTOP_APP_RELEASES_STAGING_AWS_REGION || vars.NEXTOP_APP_RELEASES_AWS_REGION }}
      aws_role_arn: ${{ vars.NEXTOP_APP_RELEASES_STAGING_AWS_ROLE_ARN || vars.NEXTOP_APP_RELEASES_AWS_ROLE_ARN }}
      s3_bucket: ${{ vars.NEXTOP_APP_RELEASES_STAGING_S3_BUCKET || vars.NEXTOP_APP_RELEASES_S3_BUCKET }}
      s3_prefix: ${{ vars.NEXTOP_APP_RELEASES_STAGING_S3_PREFIX || 'nextop-app-releases-staging' }}
      release_assets_base_url: ${{ vars.NEXTOP_APP_RELEASES_STAGING_BASE_URL || 'https://d1x7gb6wqsqmnm.cloudfront.net/nextop-app-releases-staging' }}
      publish_catalog: ${{ inputs.publish_catalog }}
      catalog_only: ${{ inputs.catalog_only }}
      catalog_cloudfront_distribution_id: ${{ vars.NEXTOP_APP_RELEASES_STAGING_CLOUDFRONT_DISTRIBUTION_ID || vars.NEXTOP_APP_RELEASES_CLOUDFRONT_DISTRIBUTION_ID || '' }}
